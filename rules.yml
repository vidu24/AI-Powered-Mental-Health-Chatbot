
version: "3.1"

rules:
- rule: Detect language at the start of a conversation
  conversation_start: true
  steps:
  - action: action_detect_language

- rule: Greet (language-agnostic)
  steps:
  - intent: greet
  - action: action_detect_language
  - action: utter_greet

- rule: Goodbye (language-agnostic)
  steps:
  - intent: goodbye
  - action: utter_goodbye